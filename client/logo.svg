<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B1464;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b300ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3"/>

  <!-- Main shield shape -->
  <path d="M 100 30 L 150 55 L 150 95 Q 150 140 100 160 Q 50 140 50 95 L 50 55 Z"
        fill="url(#logoGradient)" opacity="0.9" filter="url(#glow)"/>

  <!-- Inner shield -->
  <path d="M 100 40 L 140 60 L 140 95 Q 140 132 100 150 Q 60 132 60 95 L 60 60 Z"
        fill="none" stroke="url(#accentGradient)" stroke-width="2"/>

  <!-- Checkmark -->
  <g transform="translate(100, 95)">
    <!-- Left line of checkmark -->
    <line x1="-18" y1="5" x2="-8" y2="15" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Right line of checkmark -->
    <line x1="-8" y1="15" x2="15" y2="-10" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="70" cy="60" r="3" fill="url(#accentGradient)" opacity="0.7" filter="url(#glow)"/>
  <circle cx="130" cy="75" r="3" fill="url(#accentGradient)" opacity="0.7" filter="url(#glow)"/>
  <circle cx="85" cy="140" r="2" fill="url(#accentGradient)" opacity="0.5" filter="url(#glow)"/>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.2"/>
</svg>